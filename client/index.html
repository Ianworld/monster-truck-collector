<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monster Truck Collector</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui-layer">
      <!-- WELCOME SCREEN -->
      <div id="welcome-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:auto;">
        <h1 style="font-size: 5rem; color: #ffcc00; text-shadow: 4px 4px 0 #000; text-align: center; margin-bottom: 40px; font-family: 'Courier New', Courier, monospace;">MONSTER TRUCK<br/>COLLECTOR</h1>
        <input type="text" id="player-name-input" placeholder="Enter your name..." style="font-size: 2rem; padding: 15px; text-align: center; border: 4px solid #fff; background: #222; color: #fff; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; outline: none; border-radius: 10px;" />
        <button id="play-btn" class="retro-btn" style="font-size: 3rem; padding: 20px 60px;">PLAY</button>
      </div>

      <!-- WIN SCREEN -->
      <div id="win-screen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; color:white; text-align:center; pointer-events:auto;">
          <h1 id="win-text" style="font-size: 8rem; margin-top: 20vh; text-shadow: 4px 4px 0 #000;">RED TEAM WINS!</h1>
          <div id="countdown-number" style="font-size: 15rem; font-weight: bold; color: yellow; text-shadow: 6px 6px 0 #000;">10</div>
      </div>

      <!-- PLAYER LIST -->
      <div id="player-list-container">
        <h3 style="margin:0 0 10px 0; text-align:center; text-shadow:1px 1px 0 #000;">PLAYERS</h3>
        <div id="player-list"></div>
        <div class="ai-spawners" style="margin-top: 15px; display:flex; gap:10px; justify-content:center;">
          <button id="spawn-red-ai" class="retro-btn" style="background:#ff3333">+ Red AI</button>
          <button id="spawn-blue-ai" class="retro-btn" style="background:#33aaff">+ Blue AI</button>
        </div>
      </div>

      <div id="score-board">
        <div id="red-score">Red Team: 0</div>
        <div id="blue-score">Blue Team: 0</div>
      </div>
      <div id="boosts">BOOSTS: 5/5</div>
      <div id="settings-btn">⚙</div>
      <div id="settings-modal" style="display:none;">
        <button id="close-settings-btn" class="retro-btn">X</button>
        <button id="restart-btn" class="retro-btn">Restart Game</button>
        <button id="restart-server-btn" class="retro-btn" style="background:#666;">Restart Server</button>
        <div id="volume-control" style="display:flex; align-items:center; gap:10px; margin-top:10px;">
          <button id="mute-btn" class="retro-btn" style="padding: 5px 10px; min-width: 50px;">🔊</button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" style="flex-grow:1; cursor:pointer;" />
        </div>
      </div>
      <div id="help-btn">?</div>
      <div id="instructions-modal" style="display:none;">
        <button id="close-help-btn" class="retro-btn">X</button>
        <p>Use WASD or Arrows to drive. Space to BOOST.<br/>Collect yellow gems in the middle and bring them back to your base!</p>
      </div>

      <div id="touch-controls">
        <div id="joystick-right">
          <button id="btn-boost" class="touch-btn boost-touch-btn">BOOST</button>
        </div>
        <div id="joystick-left">
          <button id="btn-fwd-left" class="touch-btn">↖</button>
          <button id="btn-fwd" class="touch-btn">↑</button>
          <button id="btn-fwd-right" class="touch-btn">↗</button>
          <button id="btn-back" class="touch-btn" style="grid-column: 2;">↓</button>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
